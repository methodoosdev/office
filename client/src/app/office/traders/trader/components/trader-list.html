<form-list [uow]="uow"
           [toExcelButtonVisible]="true"
           [pathUrl]="pathUrl"
           [multipleDelete]="true"
		   [rowClass]="rowClass"
           [filterButtonVisible]="true"
           [settingsMenuItems]="settingsMenuItems"
           (onFilterInputsChange)="filterInputsChange($event)">

    <div *ngIf="filterInputs" style="border: 1px solid #ebebeb; padding: 10px 10px 0; margin-bottom: 1rem;">
        <form [formGroup]="filterInputs.form" class="k-form k-form-horizontal">
            <formly-form [form]="filterInputs.form" [model]="filterInputs.model" [fields]="filterInputs.fields" [options]="filterInputs.options"></formly-form>
        </form>
    </div>

    <ng-template *ngIf="actionsMenu" pTemplate="toolbar">
        <div style="margin-bottom: 1rem;">
            
            <kendo-menu [items]="actionsMenu" [openOnClick]="{ toggle: 'leave' }" (select)="onSelectMenu($event)">
            </kendo-menu>
        </div>
    </ng-template>

</form-list>
