<div>

    <div stickyToolbar class="main-toolbar">
        <div class="main-toolbar-group-left main-toolbar-group-start">
            <div class="main-toolbar-title"> {{ title }} </div>
        </div>
        <div class="main-toolbar-group-right main-toolbar-group-end gap-2">
            <button kendoButton (click)="calc()" themeColor="primary" [disabled]="!canCalc"> {{ calcLabel }} </button>
        </div>
    </div>

    <div *ngIf="infoInputs" class="k-gradient p-3 mb-3">
        <form [formGroup]="infoInputs.form" class="k-form k-form-vertical">
            <formly-form [form]="infoInputs.form" [model]="infoInputs.model" [fields]="infoInputs.fields" [options]="infoInputs.options" (modelChange)="modelChangeEvent($event)"></formly-form>
        </form>
    </div>

    <div *ngIf="gridData" [@animationState]="animate ? 'active' : 'inactive'">

        <kendo-grid #table
                    [kendoGridBinding]="gridData"
                    [kendoGridExpandDetailsBy]="expandDetailsBy"
                    [(expandedDetailKeys)]="expandedDetailKeys"
                    filterable="menu"
                    [resizable]="true"
                    (filterChange)="filterChange($event)"
                    (cellClick)="onCellClick($event)"
                    (dblclick)="onDblClick($event)">
            <ng-template kendoGridToolbarTemplate>
                <button kendoButton (click)="expandCollapse()" themeColor="warning">{{expandedDetailKeys.length ? collapseLabel : expandLabel}}</button>
                <button kendoButton (click)="save()" themeColor="primary" [disabled]="!canCalc"> {{ saveLabel }} </button>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button kendoButton (click)="exportToExcel()" themeColor="warning" [disabled]="!canExport"> Excel </button>
                <button kendoButton (click)="table.autoFitColumns()" themeColor="warning" icon="arrows-resizing" [title]="autofitColumnsLabel"></button>
            </ng-template>
            <kendo-grid-column *ngFor="let column of columns"
                               [width]="column.width"
                               [field]="column.field"
                               [title]="column.title"
                               [style]="column.style"
                               [format]="column.format"
                               [filter]="column.filterType"
                               [filterable]="column.filterable"
                               [headerStyle]="{ 'font-weight': '500' }">
                <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex" let-col="column">
                    <ng-container [ngSwitch]="column.fieldType">
                        <span *ngSwitchCase="'checkbox'" class="checkbox-column">
                            <span class="k-icon k-icon-lg" [ngClass]="{'k-i-minus-outline k-color-error': !dataItem[col.field], 'k-i-check-circle k-color-success': dataItem[col.field]}"></span>
                        </span>
                        <div *ngSwitchCase="'decimal'" class="decimal-column">
                            {{dataItem[col.field] | kendoNumber: '#,##0.00'}}
                        </div>
                        <span *ngSwitchCase="'date'" class="date-column">
                            {{dataItem[col.field] | kendoDate: "d"}}
                        </span>
                        <div *ngSwitchDefault>
                            {{dataItem[col.field]}}
                        </div>
                    </ng-container>
                </ng-template>
            </kendo-grid-column>

            <div *kendoGridDetailTemplate="let dataItem">
                <kendo-grid [data]="dataItem.details"
                            [resizable]="true"
                            (cellClick)="onDetailCellClick($event)"
                            (dblclick)="onDetailDblClick($event)">
                    <kendo-grid-column *ngFor="let col of detailColumns"
                                       [width]="col.width"
                                       [field]="col.field"
                                       [title]="col.title"
                                       [style]="col.style"
                                       [headerStyle]="{ 'font-weight': '500' }">
                        <ng-template kendoGridCellTemplate let-dataItem>
                            <ng-container [ngSwitch]="col.fieldType">
                                <span *ngSwitchCase="'decimal'" class="decimal-column">
                                    {{dataItem[col.field] | kendoNumber: '#,##0.00'}}
                                </span>
                                <span *ngSwitchDefault>
                                    {{dataItem[col.field]}}
                                </span>
                            </ng-container>
                        </ng-template>
                    </kendo-grid-column>
                </kendo-grid>
            </div>

        </kendo-grid>

    </div>

</div>
