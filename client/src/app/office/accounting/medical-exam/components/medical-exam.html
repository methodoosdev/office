<div>

    <div stickyToolbar class="main-toolbar">
        <div class="main-toolbar-group-left main-toolbar-group-start">
            <div class="main-toolbar-title"> {{ title }} </div>
        </div>
        <div class="main-toolbar-group-right main-toolbar-group-end gap-2">
            <button kendoButton style="width: 120px;" (click)="calc($event)" themeColor="primary"> Excel </button>
        </div>
    </div>

    <div *ngIf="gridData" [@animationState]="animate ? 'active' : 'inactive'">

        <kendo-grid #table
                    [sortable]="true"
                    [sort]="sort"
                    (sortChange)="sortChange($event)"
                    [reorderable]="true"
                    [resizable]="true"
                    [data]="gridData">
            <ng-template kendoGridToolbarTemplate>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button kendoGridExcelCommand themeColor="warning" [disabled]="!canExport"> Excel </button>
                <button kendoGridPDFCommand themeColor="warning" [disabled]="!canExport"> Pdf </button>
                <button kendoButton (click)="table.autoFitColumns()" themeColor="warning" icon="arrows-resizing" [title]="autofitColumnsLabel"></button>
            </ng-template>
            <kendo-grid-column *ngFor="let column of columns"
                               [field]="column.field"
                               [title]="column.title"
                               [format]="column.format"
                               [style]="column.style">
                <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex" let-col="column">
                    <ng-container [ngSwitch]="column.fieldType">
                        <div *ngSwitchCase="'decimal'" class="decimal-column">
                            {{dataItem[col.field] | kendoNumber: '#,##0.00'}}
                        </div>
                        <div *ngSwitchDefault>
                            {{dataItem[col.field]}}
                        </div>
                    </ng-container>
                </ng-template>
            </kendo-grid-column>

            <kendo-grid-excel fileName="medical-exam.xlsx"></kendo-grid-excel>
            <kendo-grid-pdf fileName="medical-exam.pdf"
                            [allPages]="true"
                            paperSize="A4"
                            margin="1cm"
                            [scale]="0.6"
                            [repeatHeaders]="true">
            </kendo-grid-pdf>
        </kendo-grid>

    </div>

</div>

<div *ngIf="loading" class="loading k-i-loading"></div>

<!--<input #fileInput type="file" (change)="onFileChange($event)" accept=".xlsx" style="display: none;"/>-->
<kendo-fileselect #fileSelect style="display: none;"
                  [restrictions]="fileRestrictions"
                  [multiple]="false"
                  (valueChange)="onFileChange($event)">
</kendo-fileselect>
