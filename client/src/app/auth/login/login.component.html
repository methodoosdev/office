<div style="background: radial-gradient(circle at 50% 3%, #9e9e9e, #212121);">
    <form class="flex justify-content-center" #form="ngForm" (submit)="submit()" novalidate style="font-size: 1.125rem;">
        <div class="w-full text-center flex justify-content-center align-items-start">
            <div class="z-5 w-full px-6 text-center mt-5 mb-5" style="max-width: 400px;">
                <!--<div class="w-full flex align-items-center justify-content-center">
                    <img src="assets/avalon/images/login/icon-login.svg" alt="avalon-layout" class="w-6rem" />
                </div>-->
                <h1 class="text-50 text-4xl font-semibold mt-2">{{ companyNameLabel }}</h1>
                <p>{{ signInLabel }}</p>
                <div class="mt-2 text-left">

                    <label for="email" class="block mb-2">{{ userNameLabel }}</label>
                    <span class="p-input-icon-right block">
                        <i class="pi pi-user"></i>
                        <input id="email" type="text" pInputText class="w-full" [(ngModel)]="model.email" name="email" [placeholder]="userNameLabel" />
                    </span>

                    <label for="password" class="block mb-2 mt-3">{{ passwordLabel }}</label>
                    <span class="p-input-icon-right block">
                        <i class="pi pi-lock"></i>
                        <input type="password" pInputText class="w-full" [(ngModel)]="model.password" name="password"  [placeholder]="passwordLabel" />
                    </span>

                    <p-checkbox [label]="rememberMeLabel" [binary]="true" class="mt-5" [(ngModel)]="model.rememberMe" name="rememberMe"></p-checkbox>

                    <div class="flex align-items-center justify-content-between mt-4 gap-3">
                        <button pButton type="submit" [label]="loginLabel" class="w-10rem"></button>
                        <a [routerLink]="['/welcome']" class="text-primary">{{ homeLabel }}</a>
                    </div>
                </div>
            </div>
        </div>
